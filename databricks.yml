bundle:
  name: dbtobsb
  databricks_cli_version: "1.7.0"
  engine: direct

include:
  - .dbtobsb-app-bindings.generated.yml

sync:
  exclude:
    - app/tests/**
    - capture/tests/**
    - collector/tests/**
    - contracts/tests/**

variables:
  warehouse_id:
    description: Existing SQL warehouse used by the fixed dbt demo task.
    default: "0000000000000000"
  evidence_catalog:
    description: Catalog that holds the dedicated evidence and demo schemas.
    default: replace_me
  evidence_schema:
    description: Dedicated schema for dbtobsb evidence objects.
    default: dbtobsb
  demo_schema:
    description: Dedicated schema for synthetic weather models.
    default: dbtobsb_demo
  observed_service_principal_name:
    description: Application ID of the dedicated observed dbt Job run-as service principal.
    default: replace_me
  collector_service_principal_name:
    description: Application ID of the dedicated collector Job run-as service principal.
    default: replace_me
  job_manager_group_name:
    description: Customer-managed group trusted to manage the two runtime Jobs.
    default: replace_me

artifacts:
  contracts_wheel:
    type: whl
    path: ./contracts
    build: uv build --wheel --out-dir dist --clear --no-create-gitignore
  capture_wheel:
    type: whl
    path: ./capture
    build: uv build --wheel --out-dir dist --clear --no-create-gitignore
  collector_wheel:
    type: whl
    path: ./collector
    build: uv build --wheel --out-dir dist --clear --no-create-gitignore

resources:
  jobs:
    dbtobsb_collector:
      name: dbtobsb-collector
      description: Unscheduled RUNTIME_DML_ONLY collector for one installed dbt task attempt.
      max_concurrent_runs: 1
      timeout_seconds: 900
      performance_target: STANDARD
      run_as:
        service_principal_name: ${var.collector_service_principal_name}
      permissions:
        - level: CAN_VIEW
          service_principal_name: ${var.collector_service_principal_name}
        - level: CAN_MANAGE_RUN
          service_principal_name: ${var.observed_service_principal_name}
        - level: CAN_MANAGE
          group_name: ${var.job_manager_group_name}
      parameters:
        - name: workspace_id
          default: "0"
        - name: observed_job_id
          default: "0"
        - name: observed_job_run_id
          default: "0"
        - name: dbt_task_run_id
          default: "0"
        - name: observed_task_key
          default: unresolved
        - name: repair_count
          default: "0"
        - name: execution_count
          default: "0"
      tasks:
        - task_key: collect
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          environment_key: collector
          python_wheel_task:
            package_name: dbtobsb-collector
            entry_point: collect
            parameters:
              - --workspace_id
              - "{{job.parameters.workspace_id}}"
              - --observed_job_id
              - "{{job.parameters.observed_job_id}}"
              - --observed_job_run_id
              - "{{job.parameters.observed_job_run_id}}"
              - --dbt_task_run_id
              - "{{job.parameters.dbt_task_run_id}}"
              - --observed_task_key
              - "{{job.parameters.observed_task_key}}"
              - --repair_count
              - "{{job.parameters.repair_count}}"
              - --execution_count
              - "{{job.parameters.execution_count}}"
      environments:
        - environment_key: collector
          spec:
            client: "5"
            dependencies:
              - ./contracts/dist/dbtobsb_contracts-0.3.0b1-py3-none-any.whl
              - ./capture/dist/dbtobsb_capture-0.3.0b1-py3-none-any.whl
              - ./collector/dist/dbtobsb_collector-0.3.0b1-py3-none-any.whl
              - databricks-sdk==0.120.0

    dbtobsb_reconciler:
      name: dbtobsb-reconciler
      description: Paused-by-default 15-minute bounded recovery scan for the fixed observed dbt Job.
      max_concurrent_runs: 1
      timeout_seconds: 900
      performance_target: STANDARD
      run_as:
        service_principal_name: ${var.collector_service_principal_name}
      permissions:
        - level: CAN_VIEW
          service_principal_name: ${var.collector_service_principal_name}
        - level: CAN_MANAGE
          group_name: ${var.job_manager_group_name}
      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: UTC
        pause_status: PAUSED
      tasks:
        - task_key: reconcile
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          environment_key: collector
          python_wheel_task:
            package_name: dbtobsb-collector
            entry_point: reconcile
            parameters:
              - --workspace_id
              - "{{workspace.id}}"
              - --reconciler_job_id
              - "{{job.id}}"
              - --reconciliation_run_id
              - "{{job.run_id}}"
      environments:
        - environment_key: collector
          spec:
            client: "5"
            dependencies:
              - ./contracts/dist/dbtobsb_contracts-0.3.0b1-py3-none-any.whl
              - ./capture/dist/dbtobsb_capture-0.3.0b1-py3-none-any.whl
              - ./collector/dist/dbtobsb_collector-0.3.0b1-py3-none-any.whl
              - databricks-sdk==0.120.0

    dbtobsb_demo:
      name: dbtobsb-demo-observed
      description: Unscheduled synthetic dbt build followed by fixed collector invocation.
      max_concurrent_runs: 1
      timeout_seconds: 1200
      performance_target: STANDARD
      run_as:
        service_principal_name: ${var.observed_service_principal_name}
      permissions:
        - level: CAN_VIEW
          service_principal_name: ${var.collector_service_principal_name}
        - level: CAN_MANAGE
          group_name: ${var.job_manager_group_name}
      tasks:
        - task_key: dbt_build
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          environment_key: dbt
          dbt_task:
            source: WORKSPACE
            project_directory: ./demo_dbt
            warehouse_id: ${var.warehouse_id}
            catalog: ${var.evidence_catalog}
            schema: ${var.demo_schema}
            commands:
              - >-
                dbt build
                --no-send-anonymous-usage-stats
                --no-upload-to-artifacts-ingest-api
                --write-json
                --log-format-file json
                --log-level-file info
                --log-file-max-bytes 20971520
                --log-path "$PWD/target/dbtobsb/attempts/w{{workspace.id}}-j{{job.id}}-r{{job.run_id}}-t{{task.run_id}}-p{{job.repair_count}}-e{{task.execution_count}}/001-build/logs"
                --no-use-colors
                --no-use-colors-file
                --warn-error-options '{"error":["NoNodesForSelectionCriteria","NothingToDo"]}'
                --target-path "$PWD/target/dbtobsb/attempts/w{{workspace.id}}-j{{job.id}}-r{{job.run_id}}-t{{task.run_id}}-p{{job.repair_count}}-e{{task.execution_count}}/001-build/artifacts"
                --no-fail-fast
                --indirect-selection eager
                --selector observability_demo
        - task_key: collect_dbt_evidence
          depends_on:
            - task_key: dbt_build
          run_if: ALL_DONE
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          run_job_task:
            job_id: ${resources.jobs.dbtobsb_collector.id}
            job_parameters:
              workspace_id: "{{workspace.id}}"
              observed_job_id: "{{job.id}}"
              observed_job_run_id: "{{job.run_id}}"
              dbt_task_run_id: "{{tasks.dbt_build.run_id}}"
              observed_task_key: dbt_build
              repair_count: "{{job.repair_count}}"
              execution_count: "{{tasks.dbt_build.execution_count}}"
      environments:
        - environment_key: dbt
          spec:
            client: "5"
            dependencies:
              - dbt-core==1.11.12
              - dbt-databricks==1.12.2
              - dbt-adapters==1.24.5
              - dbt-common==1.37.5
              - dbt-spark==1.10.3
              - dbt-protos==1.0.541
              - databricks-sdk==0.117.0
              - databricks-sql-connector==4.3.0

targets:
  smoke:
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
