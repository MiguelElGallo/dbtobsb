bundle:
  name: dbtobsb
  databricks_cli_version: "1.7.0"
  engine: direct

include:
  - .dbtobsb-observed.generated.yml
  - .dbtobsb-app-bindings.generated.yml

sync:
  include:
    - dbtobsb_onboarding/**
  exclude:
    - app/tests/**
    - capture/tests/**
    - collector/tests/**
    - contracts/tests/**

variables:
  warehouse_id:
    description: Existing SQL warehouse used by bootstrap and evidence queries.
    default: "0000000000000000"
  evidence_catalog:
    description: Catalog that holds the dedicated evidence schema.
    default: replace_me
  evidence_schema:
    description: Dedicated schema for dbtobsb evidence objects.
    default: dbtobsb
  observed_service_principal_name:
    description: Application ID of the dedicated observed dbt Job run-as service principal.
    default: replace_me
  collector_service_principal_name:
    description: Application ID of the dedicated collector Job run-as service principal.
    default: replace_me
  job_manager_group_name:
    description: Customer-managed group trusted to manage the two runtime Jobs.
    default: replace_me
  contracts_wheel_filename:
    description: Exact staged contracts wheel filename selected for this deployment.
    default: dbtobsb_contracts-0.3.0b1-py3-none-any.whl
  capture_wheel_filename:
    description: Exact staged capture wheel filename selected for this deployment.
    default: dbtobsb_capture-0.3.0b1-py3-none-any.whl
  collector_wheel_filename:
    description: Exact staged collector wheel filename selected for this deployment.
    default: dbtobsb_collector-0.3.0b1-py3-none-any.whl

artifacts:
  contracts_wheel:
    type: whl
    path: ./contracts
    build: uv build --wheel --out-dir dist --no-create-gitignore
    files:
      - source: ./contracts/dist/${var.contracts_wheel_filename}
  capture_wheel:
    type: whl
    path: ./capture
    build: uv build --wheel --out-dir dist --no-create-gitignore
    files:
      - source: ./capture/dist/${var.capture_wheel_filename}
  collector_wheel:
    type: whl
    path: ./collector
    build: uv build --wheel --out-dir dist --no-create-gitignore
    files:
      - source: ./collector/dist/${var.collector_wheel_filename}

resources:
  jobs:
    dbtobsb_collector:
      name: dbtobsb-collector
      description: Unscheduled RUNTIME_DML_ONLY collector for one installed dbt task attempt.
      max_concurrent_runs: 1
      timeout_seconds: 900
      performance_target: STANDARD
      run_as:
        service_principal_name: ${var.collector_service_principal_name}
      permissions:
        - level: CAN_VIEW
          service_principal_name: ${var.collector_service_principal_name}
        - level: CAN_MANAGE_RUN
          service_principal_name: ${var.observed_service_principal_name}
        - level: CAN_MANAGE
          group_name: ${var.job_manager_group_name}
      parameters:
        - name: workspace_id
          default: "0"
        - name: observed_job_id
          default: "0"
        - name: observed_job_run_id
          default: "0"
        - name: dbt_task_run_id
          default: "0"
        - name: observed_task_key
          default: unresolved
        - name: repair_count
          default: "0"
        - name: execution_count
          default: "0"
      tasks:
        - task_key: collect
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          environment_key: collector
          python_wheel_task:
            package_name: dbtobsb-collector
            entry_point: collect
            parameters:
              - --workspace_id
              - "{{job.parameters.workspace_id}}"
              - --observed_job_id
              - "{{job.parameters.observed_job_id}}"
              - --observed_job_run_id
              - "{{job.parameters.observed_job_run_id}}"
              - --dbt_task_run_id
              - "{{job.parameters.dbt_task_run_id}}"
              - --observed_task_key
              - "{{job.parameters.observed_task_key}}"
              - --repair_count
              - "{{job.parameters.repair_count}}"
              - --execution_count
              - "{{job.parameters.execution_count}}"
      environments:
        - environment_key: collector
          spec:
            client: "5"
            dependencies:
              - ./contracts/dist/${var.contracts_wheel_filename}
              - ./capture/dist/${var.capture_wheel_filename}
              - ./collector/dist/${var.collector_wheel_filename}
              - databricks-sdk==0.117.0

    dbtobsb_reconciler:
      name: dbtobsb-reconciler
      description: Paused-by-default 15-minute bounded recovery scan for the fixed observed dbt Job.
      max_concurrent_runs: 1
      timeout_seconds: 900
      performance_target: STANDARD
      run_as:
        service_principal_name: ${var.collector_service_principal_name}
      permissions:
        - level: CAN_VIEW
          service_principal_name: ${var.collector_service_principal_name}
        - level: CAN_MANAGE
          group_name: ${var.job_manager_group_name}
      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: UTC
        pause_status: PAUSED
      tasks:
        - task_key: reconcile
          timeout_seconds: 900
          max_retries: 0
          retry_on_timeout: false
          environment_key: collector
          python_wheel_task:
            package_name: dbtobsb-collector
            entry_point: reconcile
            parameters:
              - --workspace_id
              - "{{workspace.id}}"
              - --reconciler_job_id
              - "{{job.id}}"
              - --reconciliation_run_id
              - "{{job.run_id}}"
      environments:
        - environment_key: collector
          spec:
            client: "5"
            dependencies:
              - ./contracts/dist/${var.contracts_wheel_filename}
              - ./capture/dist/${var.capture_wheel_filename}
              - ./collector/dist/${var.collector_wheel_filename}
              - databricks-sdk==0.117.0

targets:
  smoke:
    default: true
    workspace:
      # The attended installer creates /Workspace/dbtobsb with CAN_MANAGE for
      # the deployment group and CAN_READ for the two runtime principals.
      # This keeps the payload runnable without exposing it through /Shared.
      root_path: /Workspace/dbtobsb/.bundle/${bundle.name}/${bundle.target}
