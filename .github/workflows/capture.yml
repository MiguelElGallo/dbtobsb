name: Capture library

on:
  pull_request:
    paths:
      - ".github/workflows/capture.yml"
      - "capture/**"
      - "scripts/check_capture.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/capture.yml"
      - "capture/**"
      - "scripts/check_capture.sh"

permissions:
  contents: read

concurrency:
  group: capture-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CAPTURE_PYTHON_VERSION: "3.12.3"
    steps:
      - name: Check out the reviewed source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install the pinned uv release
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Run the offline capture gates
        run: scripts/check_capture.sh
