[project]
site_name = "dbtobsb"
site_description = "Private observability for dbt Core jobs on Azure Databricks"
site_url = "https://miguelelgallo.github.io/dbtobsb/"
repo_url = "https://github.com/MiguelElGallo/dbtobsb"
repo_name = "MiguelElGallo/dbtobsb"
edit_uri = "edit/main/docs/site/"
copyright = "Copyright &copy; 2026 MiguelElGallo"
docs_dir = "docs/site"
site_dir = "site"
use_directory_urls = false
extra_css = ["stylesheets/extra.css"]
nav = [
  { "Home" = "index.md" },
  { "Tutorials" = [
    "tutorials/index.md",
    { "See your first observed dbt run" = "tutorials/see-your-first-run.md" },
    { "Inspect dbt artifacts locally" = "tutorials/inspect-artifacts-locally.md" },
  ] },
  { "How-to guides" = [
    "how-to-guides/index.md",
    { "Prepare a dbt project" = "how-to-guides/add-a-dbt-project.md" },
    { "Install the private release" = "how-to-guides/install-private-release.md" },
    { "Query observability data" = "how-to-guides/query-observability-data.md" },
    { "Recover missing evidence" = "how-to-guides/recover-missing-evidence.md" },
    { "Stop or uninstall dbtobsb" = "how-to-guides/stop-or-uninstall.md" },
  ] },
  { "Reference" = [
    "reference/index.md",
    { "Supported environment" = "reference/supported-environment.md" },
    { "dbt project input" = "reference/dbt-project-input.md" },
    { "Commands" = "reference/commands.md" },
    { "Evidence data" = "reference/evidence-data.md" },
    { "Statuses and issue codes" = "reference/statuses-and-issues.md" },
    { "Security and permissions" = "reference/security-and-permissions.md" },
    { "Glossary" = "reference/glossary.md" },
  ] },
  { "Explanation" = [
    "explanation/index.md",
    { "How capture works" = "explanation/how-capture-works.md" },
    { "Why outcomes stay separate" = "explanation/why-outcomes-stay-separate.md" },
    { "Why collection uses a separate Job" = "explanation/why-collection-uses-a-separate-job.md" },
    { "Why data stays in Databricks" = "explanation/why-data-stays-in-databricks.md" },
    { "Compute and cost" = "explanation/compute-and-cost.md" },
  ] },
]

[project.theme]
variant = "modern"
logo = "images/logo.png"
features = [
  "content.action.view",
  "navigation.indexes",
  "navigation.footer",
  "navigation.path",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"
view = "lucide/code-xml"

[project.extra]
homepage = "https://miguelelgallo.github.io/dbtobsb/"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MiguelElGallo/dbtobsb"
name = "dbtobsb source code on GitHub"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
