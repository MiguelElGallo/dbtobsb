dbtobsb_demo:
  target: demo
  outputs:
    demo:
      type: databricks
      catalog: "{{ env_var('DBTOBSB_DEMO_CATALOG', 'replace_me') }}"
      schema: "{{ env_var('DBTOBSB_DEMO_SCHEMA', 'dbtobsb_demo') }}"
      host: "{{ env_var('DATABRICKS_HOST', 'https://placeholder.azuredatabricks.net') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH', '/sql/1.0/warehouses/placeholder') }}"
      token: "{{ env_var('DATABRICKS_TOKEN', 'local-parse-placeholder-not-a-credential') }}"
      threads: 1
